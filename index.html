
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOHk Agen - AI Visual Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1; /* Indigo 500 */
            --secondary: #8b5cf6; /* Violet 500 */
            --accent: #14b8a6; /* Teal 500 */
            --bg: #09090b; /* Zinc 950 */
        }
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg);
            color: #fafafa;
            overflow-x: hidden;
            overflow-y: auto;
            min-height: 100vh;
        }
        .mesh-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 50% 0%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(20, 184, 166, 0.08) 0%, transparent 50%);
        }
        .glass-card {
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }
        .vibrant-button {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }
        .vibrant-button:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }
        .step-active {
            color: var(--primary);
            text-shadow: 0 0 10px rgba(99, 102, 241, 0.3);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        /* RUNNING LIGHT RAY BORDER EFFECT */
        @property --ray-angle {
          syntax: '<angle>';
          initial-value: 0deg;
          inherits: false;
        }

        .ray-running {
            position: relative;
        }
        
        .ray-running::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 2px; /* Ray thickness */
            background: conic-gradient(from var(--ray-angle), transparent 75%, var(--secondary), var(--primary), transparent 100%);
            
            -webkit-mask: 
               linear-gradient(#fff 0 0) content-box, 
               linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            
            z-index: 2;
            pointer-events: none;
            animation: spin-ray 4s linear infinite;
        }

        @keyframes spin-ray {
            to { --ray-angle: 360deg; }
        }
    </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",

    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div class="mesh-gradient"></div>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
